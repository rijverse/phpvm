        .page-head .repo-link svg { width: 16px; height: 16px; fill: currentColor; }

            background: #fff;

        .page-head .workspace-link:hover {

        .roadmap-wrap { max-width: 1320px; margin: 0 auto; }

        .roadmap-list {
            list-style: none; margin: 0; padding: 0;
            display: flex; flex-direction: column; gap: 12px;
        }
        .rm-item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: start; gap: 18px;
            background: #fff;
            border: 1px solid rgba(20,15,40,0.10);
            border-radius: 12px;
            padding: 16px 20px;
            box-shadow: 0 10px 30px -22px rgba(20,15,40,0.5);
        }
        .rm-item .rm-n {
            font-family: var(--mono); font-size: 12px;
            width: 26px; height: 26px; border-radius: 7px;
            display: grid; place-items: center;
            background: #f3f0ea; color: rgba(20,15,40,0.55);
            border: 1px solid rgba(20,15,40,0.08);
        }
        .rm-title {
            font-size: 15px; font-weight: 600; color: #1a1530;
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        }
        .rm-title code {
            font-family: var(--mono); font-size: 13px; font-weight: 600;
            background: rgba(138,118,214,0.10); color: var(--accent-2);
            padding: 2px 7px; border-radius: 6px;
        }
        .rm-note {
            margin-top: 4px; font-size: 13px;
            color: rgba(20,15,40,0.55); line-height: 1.45;
        }
        .rm-note code {
            font-family: var(--mono); font-size: 12px; color: rgba(20,15,40,0.72);
        }
        .rm-item.done { border-color: rgba(47,158,107,0.45); box-shadow: 0 10px 30px -22px rgba(47,158,107,0.45); }
        .rm-item.done .rm-n {
            background: rgba(47,158,107,0.14); border-color: rgba(47,158,107,0.4);
            color: #1f8a5b; font-size: 14px; font-weight: 600;
        }
        .rm-item.done .rm-title { color: rgba(20,15,40,0.55); }
        .rm-empty {
            list-style: none; margin: 0;
            background: #fff; border: 1px solid rgba(20,15,40,0.10); border-radius: 12px;
            padding: 16px 20px; color: rgba(20,15,40,0.55); font-size: 14px;
        }
        .rm-empty a { color: var(--accent-2); text-decoration: none; }
        .rm-empty a:hover { text-decoration: underline; }
        .rm-badge {
            font-family: var(--mono); font-size: 11px;
            padding: 5px 10px; border-radius: 999px; white-space: nowrap;
            border: 1px solid transparent;
        }
        .rm-badge.planned { background: rgba(138,118,214,0.12); border-color: rgba(138,118,214,0.35); color: var(--accent-2); }
        .rm-badge.idea { background: rgba(20,15,40,0.04); border-color: rgba(20,15,40,0.12); color: rgba(20,15,40,0.5); }
        .rm-badge.deferred { background: rgba(176,120,40,0.12); border-color: rgba(176,120,40,0.35); color: #8a5a12; }
        .rm-badge.done { background: rgba(47,158,107,0.14); border-color: rgba(47,158,107,0.4); color: #1f8a5b; }
        .rm-foot { margin-top: 16px; font-family: var(--mono); font-size: 13px; }
        .rm-foot a { color: var(--accent-2); text-decoration: none; }
        .rm-foot a:hover { text-decoration: underline; }

<div class="page-head">

<div class="roadmap-wrap">
    <ol id="roadmap-list" class="roadmap-list"></ol>
    <noscript>
        <p class="rm-empty">The live roadmap needs JavaScript enabled. <a href="https://github.com/rijverse/phpvm/blob/main/ROADMAP.md" target="_blank" rel="noopener">View ROADMAP.md on GitHub →</a></p>
    </noscript>
    <div class="rm-foot"><a href="https://github.com/rijverse/phpvm/blob/main/ROADMAP.md" target="_blank" rel="noopener">Read the full roadmap on GitHub →</a></div>
</div>

<script>
(function () {
    var listEl = document.getElementById('roadmap-list');
    var SRC = 'ROADMAP.md';
    var GH = 'https://github.com/rijverse/phpvm/blob/main/ROADMAP.md';

    function esc(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function inline(s) {
        return esc(s).replace(/`([^`]+)`/g, '<code>$1</code>');
    }
    function fail() {
        listEl.innerHTML = '<li class="rm-empty">Couldn’t load the roadmap right now. ' +
            '<a href="' + GH + '" target="_blank" rel="noopener">View ROADMAP.md on GitHub →</a></li>';
    }

    listEl.innerHTML = '<li class="rm-empty">Loading roadmap…</li>';

    fetch(SRC + window.location.search, { cache: 'no-cache' })
        .then(function (r) { if (!r.ok) throw new Error(r.status); return r.text(); })
        .then(function (md) {
            var lines = md.split('\n');

            // first paragraph under the "## N. ..." detail heading, used as the blurb
            function blurb(num) {
                var head = new RegExp('^##\\s+' + num + '\\.');
                for (var i = 0; i < lines.length; i++) {
                    if (!head.test(lines[i])) continue;
                    var k = i + 1, buf = [];
                    while (k < lines.length && lines[k].trim() === '') k++;
                    while (k < lines.length && lines[k].trim() !== ''
                        && !/^#{1,6}\s/.test(lines[k]) && !/^---\s*$/.test(lines[k])) {
                        buf.push(lines[k].trim()); k++;
                    }
                    return buf.join(' ');
                }
                return '';
            }

            var start = -1;
            for (var i = 0; i < lines.length; i++) {
                if (/^##\s+Status overview\s*$/i.test(lines[i])) { start = i + 1; break; }
            }
            if (start === -1) throw new Error('no status overview');

            var bullet = /^- \[([ xX])\]\s*\*\*(.+?)\*\*\s*\((.+?)\)\s*$/;
            var items = [];
            for (var j = start; j < lines.length; j++) {
                if (/^##\s/.test(lines[j]) || /^---\s*$/.test(lines[j])) break;
                var m = bullet.exec(lines[j].trim());
                if (m) items.push({ done: m[1].toLowerCase() === 'x', title: m[2], status: m[3] });
            }
            if (!items.length) throw new Error('no items');

            listEl.innerHTML = items.map(function (it) {
                var num = '', title = it.title;
                var nm = /^(\d+)\.\s*/.exec(title);
                if (nm) { num = nm[1]; title = title.slice(nm[0].length); }

                var st = it.status.toLowerCase();
                var vm = /v\d+(?:\.\d+)+/.exec(it.status);
                var kind = it.done ? 'done'
                    : st.indexOf('planned') > -1 ? 'planned'
                    : st.indexOf('deferred') > -1 ? 'deferred' : 'idea';
                var label = kind + (vm ? ' · ' + vm[0] : '');
                var desc = num ? blurb(num) : '';

                return '<li class="rm-item' + (it.done ? ' done' : '') + '">' +
                    '<span class="rm-n">' + (it.done ? '✓' : (num || '•')) + '</span>' +
                    '<div class="rm-body">' +
                        '<div class="rm-title">' + inline(title) + '</div>' +
                        (desc ? '<div class="rm-note">' + inline(desc) + '</div>' : '') +
                    '</div>' +
                    '<span class="rm-badge ' + kind + '">' + esc(label) + '</span>' +
                    '</li>';
            }).join('');
        })
        .catch(fail);
})();
</script>
