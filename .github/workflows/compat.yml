name: Compatibility

on:
  push:
    branches: [main]
    paths:
      - 'phpvm.sh'
      - 'phpvm-gui.py'
      - 'install.sh'
      - 'uninstall.sh'
      - 'shell/**'
      - 'tests/**'
      - '.github/workflows/compat.yml'
  pull_request:
    branches: [main]

jobs:
  cli:
    name: CLI / Ubuntu ${{ matrix.ubuntu }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ['20.04', '22.04', '24.04']
    container:
      image: ubuntu:${{ matrix.ubuntu }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update -qq
          apt-get install -y -qq \
            bash \
            dpkg \
            php-cli \
            shellcheck

      - name: ShellCheck
        run: |
          shellcheck -S warning phpvm.sh install.sh uninstall.sh || true

      - name: Run CLI tests
        run: bash tests/test_cli.sh phpvm.sh

  gui:
    name: GUI imports / Ubuntu ${{ matrix.ubuntu }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ['20.04', '22.04', '24.04']
    container:
      image: ubuntu:${{ matrix.ubuntu }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update -qq
          apt-get install -y -qq \
            python3 \
            python3-gi \
            gir1.2-gtk-3.0 \
            xvfb \
            libglib2.0-0 || true
          apt-get install -y -qq gir1.2-ayatana-appindicator3-0.1 2>/dev/null \
            || apt-get install -y -qq gir1.2-appindicator3-0.1 2>/dev/null \
            || echo "Warning: no appindicator package found"

      - name: Run GUI tests
        run: bash tests/test_gui.sh phpvm-gui.py
