name: Compatibility

on:
  push:
    branches: [main]
    paths:
      - 'phpvm.sh'
      - 'phpvm-gui.py'
      - 'install.sh'
      - 'uninstall.sh'
      - 'shell/**'
      - 'tests/**'
      - '.github/workflows/compat.yml'
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Install shellcheck
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck

      - name: Lint shell scripts
        run: |
          set -euo pipefail
          shellcheck -S warning \
            phpvm.sh \
            install.sh \
            uninstall.sh \
            shell/php-auto.bash \
            tests/test_cli.sh \
            tests/test_gui.sh

  cli:
    name: CLI / Ubuntu ${{ matrix.ubuntu }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ['20.04', '22.04', '24.04']
    container:
      image: ubuntu:${{ matrix.ubuntu }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Install system deps
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -y -qq \
            bash \
            dpkg \
            php-cli

      - name: Run CLI tests
        run: bash tests/test_cli.sh phpvm.sh

  gui:
    name: GUI imports / Ubuntu ${{ matrix.ubuntu }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ['20.04', '22.04', '24.04']
    container:
      image: ubuntu:${{ matrix.ubuntu }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Install required deps
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -y -qq \
            python3 \
            python3-gi \
            gir1.2-gtk-3.0 \
            xvfb \
            libglib2.0-0

      - name: Install AppIndicator (Ayatana or legacy)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          if apt-get install -y -qq gir1.2-ayatana-appindicator3-0.1 2>/dev/null; then
            echo "Installed ayatana variant"
          elif apt-get install -y -qq gir1.2-appindicator3-0.1 2>/dev/null; then
            echo "Installed legacy variant"
          else
            echo "::warning::No appindicator package available on this release"
          fi

      - name: Run GUI tests
        run: bash tests/test_gui.sh phpvm-gui.py
