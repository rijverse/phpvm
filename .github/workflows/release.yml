name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Verify repo integrity
        run: |
          set -euo pipefail
          missing=0
          for f in phpvm.sh phpvm-gui.py install.sh uninstall.sh \
                   shell/php-auto.bash shell/php-auto.zsh shell/php-auto.fish \
                   shell/shim-php \
                   assets/phpvm.svg CHANGELOG.md; do
            if [[ ! -f "$f" ]]; then
              echo "::error::Missing file: $f"
              missing=1
            fi
          done
          [[ "$missing" -eq 0 ]]

      - name: Verify tag matches VERSION
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          file_ver=$(grep -E '^VERSION="' phpvm.sh | head -1 | cut -d'"' -f2)
          echo "tag=${tag}  phpvm.sh=${file_ver}"
          if [[ "$tag" != "$file_ver" ]]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match VERSION=${file_ver} in phpvm.sh"
            exit 1
          fi

      - name: Bash syntax check
        run: |
          set -euo pipefail
          bash -n phpvm.sh
          bash -n install.sh
          bash -n uninstall.sh
          bash -n shell/php-auto.bash
          sh -n shell/shim-php

      - name: Extract changelog section for this tag
        id: notes
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          # Grab content between "## [<tag>]" and the next "## [" header.
          # Falls back to a generic note if the section is missing.
          notes=$(awk -v ver="$tag" '
            $0 ~ "^## \\["ver"\\]" {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md | sed -e '/./,$!d')
          if [[ -z "$notes" ]]; then
            notes="Release ${GITHUB_REF_NAME}. See CHANGELOG.md for details."
          fi
          {
            echo 'body<<EOF'
            echo "$notes"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.2.1
        with:
          name: phpvm ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
